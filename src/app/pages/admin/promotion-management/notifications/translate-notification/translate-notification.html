<mat-card class="cardWithShadow theme-card">
  <mat-card-header>
    <mat-card-title class="m-b-0">
      {{util.appTranslate('order_notification_translations')}}
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="table-responsive">

      <table mat-table [dataSource]="list" class="w-100">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-16 mat-subtitle-1 p-l-0">
            {{util.appTranslate('notification')}}
          </th>
          <td mat-cell *matCellDef="let element" class="f-s-14">
            {{ element.title }}
          </td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-16 mat-subtitle-1 p-r-0 text-right">
            {{util.appTranslate('th_action')}}
          </th>
          <td mat-cell *matCellDef="let element" class="f-w-500 text-right p-r-0">
            <a (click)="onEdit(element)" class="m-r-10 cursor-pointer text-primary"
              [matTooltip]="util.appTranslate('click_to_edit')">
              <mat-icon>edit</mat-icon>
            </a>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumn"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumn"></tr>

        <tr *matNoDataRow>
          <td colspan="5" class="m-b-16 m-t-16 text-center">{{util.appTranslate('table_no_data_found')}}</td>
        </tr>

      </table>

    </div>
  </mat-card-content>
</mat-card>
