<mat-card class="cardWithShadow theme-card">
  <mat-card-header>
    <mat-card-title class="m-b-0">
      {{util.appTranslate('tiffin_subscription')}}
    </mat-card-title>
  </mat-card-header>

  <mat-card-content class="b-t-0">
    <mat-tab-group mat-stretch-tabs="false" [selectedIndex]="tabIndex" mat-align-tabs="start"
      (selectedTabChange)="tabChanged($event)">
      <mat-tab [label]="util.appTranslate('tiffin_subscriptions')"></mat-tab>
      <mat-tab [label]="util.appTranslate('cancellation_reason')"></mat-tab>
    </mat-tab-group>
  </mat-card-content>
</mat-card>

@if(tabIndex == 0){
<app-admin-tiffin-subscription-package-list></app-admin-tiffin-subscription-package-list>
}
@if(tabIndex == 1){
<app-admin-tiffin-subscription-cancellation-reasons></app-admin-tiffin-subscription-cancellation-reasons>
}
