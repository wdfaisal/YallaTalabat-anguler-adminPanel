<mat-card class="cardWithShadow theme-card">
  <mat-card-header>
    <mat-card-title class="m-b-0">
      {{util.appTranslate('order_complaints')}}
    </mat-card-title>
  </mat-card-header>

  <mat-card-content class="b-t-0">
    <mat-tab-group mat-stretch-tabs="false" [selectedIndex]="tabIndex" mat-align-tabs="start"
      (selectedTabChange)="tabChanged($event)">
      <mat-tab [label]="util.appTranslate('customer_complaints')"></mat-tab>

      <mat-tab [label]="util.appTranslate('restaurant_complaints')"></mat-tab>

      <mat-tab [label]="util.appTranslate('reason_list')"></mat-tab>

    </mat-tab-group>
  </mat-card-content>
</mat-card>

@if(tabIndex == 0){
<app-complaints-list></app-complaints-list>
}
@if(tabIndex == 1){
<app-restaurant-complaints-list></app-restaurant-complaints-list>
}
@if(tabIndex == 2){
<app-complaints-reason></app-complaints-reason>
}
