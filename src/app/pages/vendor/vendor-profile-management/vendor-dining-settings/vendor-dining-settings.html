<mat-card class="cardWithShadow theme-card">
  <mat-card-header>
    <mat-card-title class="m-b-0">
      {{util.appTranslate('dining_settings')}}
    </mat-card-title>
  </mat-card-header>

  <mat-card-content class="b-t-0">
    <mat-tab-group mat-stretch-tabs="false" [selectedIndex]="tabIndex" mat-align-tabs="start"
      (selectedTabChange)="tabChanged($event)">

      <mat-tab [label]="util.appTranslate('dining_menu_photos')"></mat-tab>

      <mat-tab [label]="util.appTranslate('dining_schedule')"></mat-tab>

      <mat-tab [label]="util.appTranslate('dining_guest_availability')"></mat-tab>

    </mat-tab-group>
  </mat-card-content>
</mat-card>

@if (tabIndex == 0) {
<app-vendor-dining-menu-photos></app-vendor-dining-menu-photos>
}

@if (tabIndex == 1) {
<app-dining-schedule></app-dining-schedule>
}

@if (tabIndex == 2) {
<app-dining-guest-availability></app-dining-guest-availability>
}
