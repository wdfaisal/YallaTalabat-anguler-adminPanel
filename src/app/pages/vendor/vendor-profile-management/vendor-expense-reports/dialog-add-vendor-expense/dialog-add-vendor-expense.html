<h2 mat-dialog-title class="dialog-title">
  <span class="title-text">{{util.appTranslate('add_expense')}}</span>
  <button mat-icon-button mat-dialog-close class="close-btn">
    <mat-icon>close</mat-icon>
  </button>
</h2>
<div mat-dialog-content style="max-width: 600px;max-height: max-content;" class="m-t-12 p-t-12">
  <form name="eventForm" [formGroup]="expenseForm" class="event-form" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col-12 m-b-16 p-b-16">
        <mat-form-field appearance="outline" class="w-100" color="primary">
          <mat-label>{{util.appTranslate('th_amount')}}</mat-label>
          <input matInput formControlName="amount" type="number" />
          @if(haveSubmitClicked == true && f['amount'].invalid){
          <mat-hint class="m-b-16 error-msg">
            @if(f['amount'].errors && f['amount'].errors['required']){
            <div class="text-error">
              {{util.appTranslate('form_required')}}
            </div>
            }
          </mat-hint>
          }
        </mat-form-field>
      </div>
    </div>
    <div mat-dialog-actions class="p-b-24">
      <button mat-button mat-flat-button color="primary" type="submit" [disabled]="isSubmit == true">
        @if (isSubmit == true) {
        <mat-icon>
          <mat-spinner diameter="15"></mat-spinner>
        </mat-icon>
        }
        {{util.appTranslate('save_btn')}}
      </button>
      <button mat-button mat-dialog-close class="m-l-8 bg-secondary text-white">{{util.appTranslate('cancel_btn')}}</button>
    </div>
  </form>
</div>
