<h2 mat-dialog-title class="dialog-title">
  <span class="title-text">{{util.appTranslate('-')}}</span>
  <button mat-icon-button mat-dialog-close class="close-btn">
    <mat-icon>close</mat-icon>
  </button>
</h2>
<mat-dialog-content class="mat-typography m-t-12 p-t-12">
  <mat-card class="cardWithShadow theme-card">
    <mat-card-content>
      @if (isLoaded) {
      <div class="row">
        <div class="col-lg-12 col-sm-12 p-b-16">
          <div class="vendor-table-qr-print">
            <div class="table-print-content" [ngStyle]="{'width': contentWidth }">
              <div class="logo-container">
                <img [src]="api.mediaUrl+restaurantLogo" alt="LOGO" class="logo-img"
                  onError="this.src='assets/images/onerror.png'">
              </div>
              <h3 [ngStyle]="{'width': contentWidth }">{{restaurantName}}</h3>
              <h2 [ngStyle]="{'width': contentWidth ,'text-transform':'uppercase'}">{{util.appTranslate('table_no')}}:
                {{tableNo}}</h2>

              <qrcode id="qr-code" [qrdata]="deepLink" [width]="256" [errorCorrectionLevel]="'Q'"></qrcode>

              <div class="line"></div>

              <p class="lbl-center" [ngStyle]="{'width': contentWidth }">
                {{util.appTranslate('scan_qr_code_lbl')}}
              </p>

            </div>
          </div>
        </div>
      </div>
      }
    </mat-card-content>
  </mat-card>

</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-flat-button class="bg-secondary text-white" mat-dialog-close>{{util.appTranslate('cancel_btn')}}</button>
  <button mat-flat-button color="primary" (click)="onPrint()"
    cdkFocusInitial>{{util.appTranslate('print_qr_table_btn')}}</button>
</mat-dialog-actions>
